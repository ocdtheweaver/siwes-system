services:
  - type: web
    name: siwes-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_BASE_URL
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: siwes-db
          property: connectionString

databases:
  - name: siwes-db
    plan: free
    databaseName: siwes_system
    user: siwes_user
